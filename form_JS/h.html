<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>



<body class="min-h-screen text-white px-6 py-16">

    <div class="max-w-4xl mx-auto space-y-16">

        <!-- Add User Form -->
        <div class="card-glass rounded-2xl p-8 max-w-lg mx-auto fade-up">
            <h1 class="text-2xl font-bold tracking-tight text-white mb-8 text-center">Add User</h1>

            <form id="userForm" class="space-y-5">

                <!-- Name -->
                <div class="fade-up delay-1">
                    <label class="label-text block mb-2">Name</label>
                    <input type="text" id="name" placeholder="Enter name"
                        class="input-field w-full rounded-lg px-4 py-3 text-sm" />
                </div>

                <!-- Role -->
                <div class="fade-up delay-2">
                    <label class="label-text block mb-2">Role</label>
                    <input type="text" id="role" placeholder="Enter role"
                        class="input-field w-full rounded-lg px-4 py-3 text-sm" />
                </div>

                <!-- Bio -->
                <div class="fade-up delay-3">
                    <label class="label-text block mb-2">Bio</label>
                    <textarea rows="4" id="bio" placeholder="Write a short bio..."
                        class="input-field w-full rounded-lg px-4 py-3 text-sm resize-none"></textarea>
                </div>

                <!-- Photo URL -->
                <div class="fade-up delay-4">
                    <label class="label-text block mb-2">Photo URL</label>
                    <input type="url" id="photo" placeholder="https://example.com/photo.jpg"
                        class="input-field w-full rounded-lg px-4 py-3 text-sm" />
                </div>

                <!-- Submit -->
                <div class="fade-up delay-5 pt-2">
                    <button type="submit" class="submit-btn w-full rounded-lg py-3 text-sm font-semibold tracking-wide text-white">
                        Submit
                    </button>
                </div>

            </form>
        </div>

        <!-- User Cards -->
        <div id= "userGrid" class="grid grid-cols-1 sm:grid-cols-3 gap-5 fade-up delay-6">


        </div>
    </div>
    <script src="main.js"></script>
</body>



</html>
